server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://${MYSQLHOST}:${MYSQLPORT}/${MYSQLDATABASE}
    username: ${MYSQLUSER}
    password: ${MYSQLPASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update #create, update, validate(배포)
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: false
  data:
    redis:
      host: ${REDIS_HOST}
      port: ${REDIS_PORT}
      password: ${REDIS_PASSWORD}
      timeout: 6000ms


oauth:
  kakao:
    client-id: ${KAKAO_CLIENT_ID}
    client-secret: ${KAKAO_CLIENT_SECRET}
    redirect-uri: ${KAKAO_REDIRECT_URI}

jwt:
  secret: ${JWT_SECRET}

logging:
  level:
    root: INFO
    org.springframework.security: INFO
    com.example.unis_rssol: INFO
    org.hibernate.SQL: INFO                # SQL 쿼리만 출력
    org.hibernate.orm.jdbc.bind: OFF
    org.springframework.transaction: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info  # 허용할 엔드포인트
  endpoint:
    health:
      show-details: always  # 상세 정보 표시, 필요에 따라 'never' 또는 'when-authorized'